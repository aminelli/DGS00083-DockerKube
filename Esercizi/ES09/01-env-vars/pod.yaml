apiVersion: v1
kind: Pod
metadata:
  name: env-vars-demo
  namespace: default
  labels:
    app: env-vars-demo
    scenario: cm-env-vars
spec:
  restartPolicy: Never
  containers:
    - name: demo
      image: busybox:1.36
      command: ["sh", "-c"]
      args:
        - |
          echo "=== Variabili d'ambiente dal ConfigMap (valueFrom) ==="
          echo "  DB_HOST           = $DB_HOST"
          echo "  DB_PORT           = $DB_PORT"
          echo "  DB_NAME           = $DB_NAME"
          echo "  APP_ENV           = $APP_ENV"
          echo "  LOG_LEVEL         = $LOG_LEVEL"
          echo "  FEATURE_DARK_MODE = $FEATURE_DARK_MODE"
          echo "  MAX_POOL_SIZE     = $MAX_POOL_SIZE"
          echo ""
          echo "=== Chiave opzionale non presente nel ConfigMap ==="
          echo "  OPTIONAL_MISSING  = ${OPTIONAL_MISSING:-<non impostata>}"
          echo ""
          echo "=== Tutte le env var del container ==="
          env | sort
          echo "Pod in sleep, usa 'kubectl exec' per altri test..."
          sleep 3600
      env:
        # --- chiavi specifiche dal ConfigMap ---
        - name: DB_HOST
          valueFrom:
            configMapKeyRef:
              name: app-config-envvar
              key: DB_HOST
        - name: DB_PORT
          valueFrom:
            configMapKeyRef:
              name: app-config-envvar
              key: DB_PORT
        - name: DB_NAME
          valueFrom:
            configMapKeyRef:
              name: app-config-envvar
              key: DB_NAME
        - name: APP_ENV
          valueFrom:
            configMapKeyRef:
              name: app-config-envvar
              key: APP_ENV
        - name: LOG_LEVEL
          valueFrom:
            configMapKeyRef:
              name: app-config-envvar
              key: LOG_LEVEL
        - name: FEATURE_DARK_MODE
          valueFrom:
            configMapKeyRef:
              name: app-config-envvar
              key: FEATURE_DARK_MODE
        - name: MAX_POOL_SIZE
          valueFrom:
            configMapKeyRef:
              name: app-config-envvar
              key: MAX_POOL_SIZE
        # --- chiave con optional: true (non fa fallire il pod se mancante) ---
        - name: OPTIONAL_MISSING
          valueFrom:
            configMapKeyRef:
              name: app-config-envvar
              key: THIS_KEY_DOES_NOT_EXIST
              optional: true
      resources:
        requests:
          cpu: 50m
          memory: 32Mi
        limits:
          cpu: 100m
          memory: 64Mi
