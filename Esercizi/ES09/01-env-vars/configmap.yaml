# ─────────────────────────────────────────────────────────────
# SCENARIO 01 — env var singole con valueFrom.configMapKeyRef
# ─────────────────────────────────────────────────────────────
# Ogni chiave del ConfigMap viene esposta come variabile
# d'ambiente specifica nel container.
# La chiave può avere un nome diverso dalla variabile (key / name).
# ─────────────────────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config-envvar
  namespace: default
  labels:
    scenario: cm-env-vars
data:
  DB_HOST: "postgres.default.svc.cluster.local"
  DB_PORT: "5432"
  DB_NAME: "myapp_db"
  APP_ENV: "development"
  LOG_LEVEL: "debug"
  FEATURE_DARK_MODE: "true"
  MAX_POOL_SIZE: "10"
  # Nota: i valori sono SEMPRE stringhe in un ConfigMap.
  # Il container interpreta "5432" come stringa; l'app deve convertire i tipi.
