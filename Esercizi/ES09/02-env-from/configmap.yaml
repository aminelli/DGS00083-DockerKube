# ─────────────────────────────────────────────────────────────
# SCENARIO 02 — envFrom: tutte le chiavi come env vars
# ─────────────────────────────────────────────────────────────
# envFrom importa TUTTE le chiavi del ConfigMap come variabili
# d'ambiente in un colpo solo, senza elencarle una per una.
# Utile quando il ConfigMap ha molte chiavi.
# ─────────────────────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config-envfrom
  namespace: default
  labels:
    scenario: cm-env-from
data:
  APP_NAME: "my-application"
  APP_VERSION: "1.3.0"
  APP_PORT: "8080"
  ENVIRONMENT: "staging"
  LOG_FORMAT: "json"
  LOG_LEVEL: "info"
  DATABASE_URL: "postgresql://user:pass@db:5432/myapp"
  REDIS_HOST: "redis.default.svc.cluster.local"
  REDIS_PORT: "6379"
  CACHE_TTL: "300"
  JWT_EXPIRY: "3600"
  CORS_ORIGINS: "https://app.example.com,https://admin.example.com"
