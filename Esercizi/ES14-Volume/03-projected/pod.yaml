# Scenario 03 — projected Volume
# Un singolo volume che aggrega più sorgenti:
#   - ServiceAccount token (con expiry configurabile)
#   - ConfigMap
#   - Secret
#   - downwardAPI (metadata del pod)
apiVersion: v1
kind: ConfigMap
metadata:
  name: projected-app-config
  namespace: default
  labels:
    scenario: volume-projected
data:
  app.properties: |
    app.name=projected-demo
    app.version=1.0.0
    app.environment=kind-lab
  feature-flags.json: |
    {
      "featureA": true,
      "featureB": false,
      "maxRetries": 3
    }
---
apiVersion: v1
kind: Secret
metadata:
  name: projected-app-secret
  namespace: default
  labels:
    scenario: volume-projected
type: Opaque
stringData:
  api-key: "sk-proj-demo-key-123456"
  db-password: "proj-demo-password"
---
apiVersion: v1
kind: Pod
metadata:
  name: projected-demo
  namespace: default
  labels:
    app: projected-demo
    scenario: volume-projected
  annotations:
    lab/purpose: "dimostrazione projected volume"
spec:
  restartPolicy: Never
  containers:
    - name: app
      image: busybox:1.36
      command: ["sh", "-c"]
      args:
        - |
          echo "=== projected Volume: tutte le sorgenti in /projected/ ==="
          echo ""
          echo "==> Struttura del volume:"
          find /projected -type f | sort
          echo ""
          echo "==> [1] ServiceAccount token (proiettato, con TTL):"
          ls -la /projected/token
          TOKEN_LEN=$(wc -c < /projected/token)
          echo "    Lunghezza token: $TOKEN_LEN bytes"
          echo ""
          echo "==> [2] ConfigMap — app.properties:"
          cat /projected/config/app.properties
          echo ""
          echo "==> [3] Secret — api-key (NON stampare in prod!):"
          echo "    api-key presente: $([ -f /projected/secrets/api-key ] && echo SI || echo NO)"
          echo "    api-key length: $(wc -c < /projected/secrets/api-key)"
          echo ""
          echo "==> [4] DownwardAPI — metadata del pod:"
          cat /projected/podinfo/labels
          echo "    namespace: $(cat /projected/podinfo/namespace)"
          echo "    pod name:  $(cat /projected/podinfo/name)"
          echo ""
          echo "==> [5] DownwardAPI — risorse limiti/richieste:"
          cat /projected/podinfo/cpu-limit    2>/dev/null || echo "    (cpu-limit non disponibile)"
          cat /projected/podinfo/memory-limit 2>/dev/null || echo "    (memory-limit non disponibile)"
          sleep 3600
      volumeMounts:
        - name: projected-vol
          mountPath: /projected
      resources:
        requests: { cpu: 50m, memory: 32Mi }
        limits:   { cpu: 200m, memory: 128Mi }

  volumes:
    - name: projected-vol
      projected:
        defaultMode: 0440
        sources:
          # 1. ServiceAccount token proiettato (TTL 1h, k8s rinnova automaticamente)
          - serviceAccountToken:
              path: token
              expirationSeconds: 3600
              audience: api

          # 2. ConfigMap
          - configMap:
              name: projected-app-config
              items:
                - key: app.properties
                  path: config/app.properties
                - key: feature-flags.json
                  path: config/feature-flags.json

          # 3. Secret
          - secret:
              name: projected-app-secret
              items:
                - key: api-key
                  path: secrets/api-key
                  mode: 0400

          # 4. DownwardAPI: label, namespace, nome pod, risorse
          - downwardAPI:
              items:
                - path: podinfo/labels
                  fieldRef:
                    fieldPath: metadata.labels
                - path: podinfo/namespace
                  fieldRef:
                    fieldPath: metadata.namespace
                - path: podinfo/name
                  fieldRef:
                    fieldPath: metadata.name
                - path: podinfo/cpu-limit
                  resourceFieldRef:
                    containerName: app
                    resource: limits.cpu
                - path: podinfo/memory-limit
                  resourceFieldRef:
                    containerName: app
                    resource: limits.memory
