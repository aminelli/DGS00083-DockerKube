# Scenario 02 — hostPath
# Monta una directory o un file direttamente dal filesystem del nodo (worker).
# ⚠ SOLO per sviluppo/debug: espone il filesystem del nodo, NON usare in prod.
apiVersion: v1
kind: Pod
metadata:
  name: hostpath-demo
  namespace: default
  labels:
    app: hostpath-demo
    scenario: volume-hostpath
spec:
  restartPolicy: Never
  containers:
    - name: app
      image: busybox:1.36
      command: ["sh", "-c"]
      args:
        - |
          echo "=== hostPath: /host-tmp montato dal nodo ==="
          echo ""
          echo "==> Scrivo un file sul nodo tramite hostPath..."
          echo "Scritto dal pod hostpath-demo il $(date)" > /host-tmp/from-pod.txt
          echo ""
          echo "==> Contenuto di /host-tmp/ :"
          ls -la /host-tmp/
          echo ""
          echo "==> Mostro /etc/os-release del nodo (read-only mount):"
          cat /host-os-release 2>/dev/null || echo "(file non disponibile)"
          echo ""
          echo "==> hostPath /var/log del nodo (read-only):"
          ls /host-var-log/ | head -10
          sleep 3600
      volumeMounts:
        - name: host-tmp
          mountPath: /host-tmp
        - name: host-os-release
          mountPath: /host-os-release
          readOnly: true
        - name: host-var-log
          mountPath: /host-var-log
          readOnly: true
      resources:
        requests: { cpu: 50m, memory: 32Mi }
        limits:   { cpu: 100m, memory: 64Mi }

  volumes:
    # Cartella temporanea sul nodo (scrivibile)
    - name: host-tmp
      hostPath:
        path: /tmp/k8s-hostpath-demo
        type: DirectoryOrCreate   # crea la directory se non esiste

    # File singolo dal nodo (read-only)
    - name: host-os-release
      hostPath:
        path: /etc/os-release
        type: FileOrCreate

    # Log del nodo (read-only)
    - name: host-var-log
      hostPath:
        path: /var/log
        type: Directory
