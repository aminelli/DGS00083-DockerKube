# Scenario 01 — CronJob base
# Esegue un job ogni minuto che stampa data/ora e un messaggio.
# È il punto di partenza per capire la struttura di un CronJob.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: hello-cronjob
  namespace: default
  labels:
    app: hello-cronjob
    scenario: cronjob-basic
spec:
  # Sintassi cron: minuto ora giorno-mese mese giorno-settimana
  # * * * * *  = ogni minuto
  # 0 * * * *  = ogni ora (al minuto 0)
  # 0 8 * * 1  = ogni lunedì alle 08:00
  schedule: "* * * * *"

  # Quanti Job completati/falliti tenere in cronologia
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit:     1

  # Cosa fare se un'esecuzione viene avviata mentre una precedente è ancora in corso
  # Allow (default): permette esecuzioni parallele
  # Forbid:          salta se già in corso
  # Replace:         cancella quella in corso e avvia la nuova
  concurrencyPolicy: Allow

  # Se il controller è offline, quanti secondi di ritardo tollerare
  # prima di considerare l'esecuzione persa
  startingDeadlineSeconds: 60

  jobTemplate:
    metadata:
      labels:
        scenario: cronjob-basic
    spec:
      # Numero di tentativi prima di segnare il Job come Failed
      backoffLimit: 2
      # Il Job viene eliminato automaticamente dopo N secondi dal completamento
      ttlSecondsAfterFinished: 120

      template:
        metadata:
          labels:
            app: hello-cronjob
            scenario: cronjob-basic
        spec:
          restartPolicy: OnFailure
          containers:
            - name: hello
              image: busybox:1.36
              command: ["sh", "-c"]
              args:
                - |
                  echo "================================================"
                  echo " CronJob hello-cronjob"
                  echo " Avvio:      $(date -u '+%Y-%m-%dT%H:%M:%SZ')"
                  echo " Hostname:   $HOSTNAME"
                  echo " JOB_NAME:   ${JOB_NAME:-n/d}"
                  echo " JOB_COMPLETION_INDEX: ${JOB_COMPLETION_INDEX:-n/d}"
                  echo "================================================"
                  echo "Elaborazione in corso..."
                  sleep 5
                  echo "Completato."
              env:
                - name: JOB_NAME
                  valueFrom:
                    fieldRef:
                      fieldPath: metadata.labels['batch.kubernetes.io/job-name']
              resources:
                requests: { cpu: 50m, memory: 32Mi }
                limits:   { cpu: 100m, memory: 64Mi }
