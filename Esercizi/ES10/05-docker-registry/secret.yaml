# ─────────────────────────────────────────────────────────────
# SCENARIO 05 — Docker Registry pull secret
# ─────────────────────────────────────────────────────────────
# Tipo: kubernetes.io/dockerconfigjson
# Usato per autenticarsi su registry privati durante il pull delle immagini.
#
# CREAZIONE IMPERATIVA (consigliata, evita di scrivere base64 a mano):
#   kubectl create secret docker-registry registry-creds \
#     --docker-server=registry.example.com \
#     --docker-username=my-user \
#     --docker-password=my-password \
#     --docker-email=ci@example.com
#
# Questo YAML usa stringData per chiarezza. I valori sono DEMO.
# ─────────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: registry-credentials
  namespace: default
  labels:
    scenario: secret-registry
type: kubernetes.io/dockerconfigjson
stringData:
  # Il campo DEVE chiamarsi ".dockerconfigjson"
  .dockerconfigjson: |
    {
      "auths": {
        "registry.example.com": {
          "username": "demo-ci-user",
          "password": "demo-registry-token-REPLACE",
          "email": "ci@example.com",
          "auth": "ZGVtby1jaS11c2VyOmRlbW8tcmVnaXN0cnktdG9rZW4tUkVQTEFDRQ=="
        }
      }
    }
