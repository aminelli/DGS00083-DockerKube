# ─────────────────────────────────────────────────────────────
# SCENARIO 01 — Secret Opaque: credenziali database
# ─────────────────────────────────────────────────────────────
# ⚠  SICUREZZA: questo file contiene credenziali DEMO (fittizie).
#    MAI committare Secret con dati reali in un repository Git.
#    Usa SOPS, Sealed Secrets, Vault o External Secrets Operator.
#
# TIPO "Opaque": tipo generico, accetta qualsiasi coppia chiave/valore.
# ─────────────────────────────────────────────────────────────

# ── Variante A: stringData ────────────────────────────────────
# I valori sono in chiaro nel YAML.
# Kubernetes li converte in base64 automaticamente al momento del salvataggio.
# Dopo kubectl apply, 'kubectl get secret -o yaml' mostrerà solo 'data' (base64).
apiVersion: v1
kind: Secret
metadata:
  name: db-credentials
  namespace: default
  labels:
    scenario: secret-opaque
type: Opaque
stringData:
  username: "demo-user"
  password: "DemoPass123!"
  db-host: "postgres.default.svc.cluster.local"
  db-port: "5432"
  connection-string: "postgresql://demo-user:DemoPass123!@postgres:5432/myapp"
---
# ── Variante B: data (base64 esplicito) ───────────────────────
# Questo è il formato interno usato da Kubernetes.
# Utile quando il valore è già base64 (certificati, file binari).
#
#   PowerShell: [Convert]::ToBase64String([Text.Encoding]::UTF8.GetBytes("demo-user"))
#   Bash:       echo -n "demo-user" | base64
#
#   "demo-user"   → ZGVtby11c2Vy
#   "DemoPass123!" → RGVtb1Bhc3MxMjMh
apiVersion: v1
kind: Secret
metadata:
  name: db-credentials-b64
  namespace: default
  labels:
    scenario: secret-opaque
type: Opaque
data:
  username: ZGVtby11c2Vy        # "demo-user"
  password: RGVtb1Bhc3MxMjMh    # "DemoPass123!"
