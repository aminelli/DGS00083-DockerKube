# ─────────────────────────────────────────────────────────────
# SCENARIO 06 — ServiceAccount con token Secret + RBAC
# ─────────────────────────────────────────────────────────────
# In Kubernetes ≥ 1.24 i token per ServiceAccount NON vengono
# più creati automaticamente. Per un token permanente (es. CI/CD)
# si crea manualmente un Secret di tipo service-account-token.
#
# ALTERNATIVA consigliata per pod normali:
#   Non creare il Secret manualmente. Il pod riceve un token
#   temporaneo proiettato automaticamente in:
#   /var/run/secrets/kubernetes.io/serviceaccount/token
# ─────────────────────────────────────────────────────────────

# 1. ServiceAccount
apiVersion: v1
kind: ServiceAccount
metadata:
  name: pod-reader-sa
  namespace: default
  labels:
    scenario: secret-serviceaccount
---
# 2. Secret che genera il token per il ServiceAccount (k8s ≥ 1.24)
#    L'annotazione kubernetes.io/service-account.name collega il Secret al SA.
#    Kubernetes popola .data.token automaticamente.
apiVersion: v1
kind: Secret
metadata:
  name: pod-reader-sa-token
  namespace: default
  labels:
    scenario: secret-serviceaccount
  annotations:
    kubernetes.io/service-account.name: pod-reader-sa
type: kubernetes.io/service-account-token
---
# 3. Role: permessi di sola lettura su Pod e ConfigMap nel namespace default
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: pod-reader-role
  namespace: default
  labels:
    scenario: secret-serviceaccount
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list"]
---
# 4. RoleBinding: collega il Role al ServiceAccount
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: pod-reader-binding
  namespace: default
  labels:
    scenario: secret-serviceaccount
subjects:
  - kind: ServiceAccount
    name: pod-reader-sa
    namespace: default
roleRef:
  kind: Role
  name: pod-reader-role
  apiGroup: rbac.authorization.k8s.io
