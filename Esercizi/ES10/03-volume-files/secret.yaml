# ─────────────────────────────────────────────────────────────
# SCENARIO 03 — Volume mount: Secret come file su disco
# ─────────────────────────────────────────────────────────────
# Ogni chiave del Secret diventa un file nella directory di mount.
# I file sono leggibili solo dal processo con i permessi corretti
# (defaultMode: 0400 per i file sensibili).
# ⚠  SICUREZZA: valori DEMO.
# ─────────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: app-secret-files
  namespace: default
  labels:
    scenario: secret-volume
type: Opaque
stringData:
  # Chiave API per servizio esterno
  api-key.txt: "sk-demo-api-key-REPLACE-WITH-REAL-ONE-abcdef1234"

  # Configurazione con credenziali (es. file .env o .ini)
  credentials.conf: |
    [database]
    host     = postgres.default.svc.cluster.local
    port     = 5432
    name     = myapp_db
    user     = app_user
    password = Db$ecret-DEMO-42

    [cache]
    host     = redis.default.svc.cluster.local
    password = Redis$ecret-DEMO

  # Chiave SSH privata (DEMO — non è una chiave reale)
  ssh-private-key: |
    -----BEGIN OPENSSH PRIVATE KEY-----
    DEMO-KEY-NOT-REAL-DO-NOT-USE-IN-PRODUCTION
    REPLACE-WITH-ACTUAL-SSH-PRIVATE-KEY-CONTENT
    -----END OPENSSH PRIVATE KEY-----

  # File .pgpass per connessioni PostgreSQL senza password interattiva
  .pgpass: "postgres.default.svc.cluster.local:5432:myapp_db:app_user:Db$ecret-DEMO-42"
