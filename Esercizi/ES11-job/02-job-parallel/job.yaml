# ─────────────────────────────────────────────────────────────
# JOB PARALLELO con completionMode: Indexed
# ─────────────────────────────────────────────────────────────
# DESCRIZIONE:
#   Kubernetes avvia fino a `parallelism` Pod contemporaneamente.
#   Con completionMode: Indexed ogni Pod riceve un indice univoco
#   tramite la variabile d'ambiente JOB_COMPLETION_INDEX (0-based).
#   Il Job è completato quando tutti gli indici da 0 a (completions-1)
#   hanno terminato con successo.
#
# CAMPI CHIAVE:
#   completions: 6    → numero totale di unità di lavoro (indici 0-5)
#   parallelism: 3    → massimo 3 Pod attivi contemporaneamente
#   completionMode    → Indexed: ogni pod elabora un indice specifico
#                       NonIndexed (default): i pod sono intercambiabili
# ─────────────────────────────────────────────────────────────
apiVersion: batch/v1
kind: Job
metadata:
  name: job-parallel
  namespace: corso
  labels:
    scenario: job-parallel
spec:
  completions: 6             # 6 unità di lavoro totali (indici 0..5)
  parallelism: 3             # massimo 3 Pod attivi contemporaneamente
  completionMode: Indexed    # ogni Pod conosce il proprio indice
  backoffLimit: 2
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        scenario: job-parallel
    spec:
      restartPolicy: Never
      containers:
        - name: worker
          image: busybox:1.36
          command: ["sh", "-c"]
          args:
            - |
              echo "========================================"
              echo " Worker avviato"
              echo " Indice: $JOB_COMPLETION_INDEX"
              echo " Pod:     $HOSTNAME"
              echo "========================================"
              # Simula workload diverso per indice (es. shard di dati)
              SHARD_START=$(( JOB_COMPLETION_INDEX * 1000 ))
              SHARD_END=$(( SHARD_START + 999 ))
              echo "Elaborazione shard [$SHARD_START - $SHARD_END]..."
              sleep $(( (JOB_COMPLETION_INDEX % 3) + 2 ))
              echo "Shard $JOB_COMPLETION_INDEX completato."
          env:
            - name: JOB_COMPLETION_INDEX
              valueFrom:
                fieldRef:
                  fieldPath: metadata.annotations['batch.kubernetes.io/job-completion-index']
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
