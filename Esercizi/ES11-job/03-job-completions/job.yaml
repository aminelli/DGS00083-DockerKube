# ─────────────────────────────────────────────────────────────
# JOB CON COMPLETIONS SEQUENZIALI
# ─────────────────────────────────────────────────────────────
# DESCRIZIONE:
#   Il Job deve completare N esecuzioni in sequenza (parallelism=1).
#   Ogni Pod elabora un item dalla "coda" usando una variabile che
#   simula un work queue. Utile quando le elaborazioni non possono
#   essere parallelizzate (es. migrazione step-by-step).
#
# CAMPI CHIAVE:
#   completions: 4    → 4 Pod devono terminare con successo
#   parallelism: 1    → un Pod alla volta (sequenziale)
#   activeDeadlineSeconds → timeout globale del Job (se supera
#                           questo tempo viene terminato)
# ─────────────────────────────────────────────────────────────
apiVersion: batch/v1
kind: Job
metadata:
  name: job-sequential
  labels:
    scenario: job-completions
spec:
  completions: 4             # 4 esecuzioni sequenziali
  parallelism: 1             # una alla volta
  backoffLimit: 2
  activeDeadlineSeconds: 180 # timeout globale: 3 minuti
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        scenario: job-completions
    spec:
      restartPolicy: Never
      containers:
        - name: migrator
          image: busybox:1.36
          command: ["sh", "-c"]
          args:
            - |
              echo "========================================"
              echo " Migrazione step sequenziale"
              echo " Pod: $HOSTNAME"
              echo "========================================"
              # In uno scenario reale qui leggeresti il prossimo item
              # da una coda (Redis, SQS, database, ecc.)
              echo "Acquisizione prossimo item dalla coda..."
              sleep 2
              ITEM="record_$(date +%s)"
              echo "Elaborazione item: $ITEM"
              sleep 3
              echo "Scrittura risultato nel database di destinazione..."
              sleep 1
              echo "Step completato: $ITEM migrato con successo."
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
