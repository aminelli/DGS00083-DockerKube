# Scenario 03 — DaemonSet con Tolerations
#
# I nodi possono avere dei "taint" (macchie) che impediscono la schedulazione
# di pod normali. Un pod deve dichiarare una "toleration" per ogni taint.
#
# Taint di sistema importanti:
#   node-role.kubernetes.io/control-plane:NoSchedule  → nodi control-plane
#   node.kubernetes.io/not-ready:NoExecute            → nodi non pronti
#   node.kubernetes.io/unreachable:NoExecute          → nodi irraggiungibili
#   node.kubernetes.io/disk-pressure:NoSchedule       → disco pieno
#   node.kubernetes.io/memory-pressure:NoSchedule     → memoria esaurita
#
# DaemonSet di sistema (plugin rete, storage) tollerano TUTTI i taint
# perché devono girare anche su nodi problematici.
---
# DaemonSet che gira SOLO sui worker node (nessuna toleration per control-plane)
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: worker-only-agent
  namespace: default
  labels:
    app: worker-only-agent
    scenario: ds-tolerations
spec:
  selector:
    matchLabels:
      app: worker-only-agent

  template:
    metadata:
      labels:
        app: worker-only-agent
        scenario: ds-tolerations
    spec:
      terminationGracePeriodSeconds: 5
      # Nessuna toleration → NON gira sui nodi control-plane (tainted)
      containers:
        - name: agent
          image: busybox:1.36
          command: ["sh", "-c"]
          args:
            - |
              echo "worker-only-agent su: $NODE_NAME (solo worker node)"
              sleep 3600
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          resources:
            requests: { cpu: 25m, memory: 16Mi }
            limits:   { cpu: 50m, memory: 32Mi }
---
# DaemonSet che gira su TUTTI i nodi incluso il control-plane
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: all-nodes-agent
  namespace: default
  labels:
    app: all-nodes-agent
    scenario: ds-tolerations
spec:
  selector:
    matchLabels:
      app: all-nodes-agent

  template:
    metadata:
      labels:
        app: all-nodes-agent
        scenario: ds-tolerations
    spec:
      terminationGracePeriodSeconds: 5

      tolerations:
        # Tolera il taint del control-plane (sia vecchia che nuova label)
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
        - key: node-role.kubernetes.io/master      # k8s < 1.24 (deprecated)
          operator: Exists
          effect: NoSchedule
        # Tolera i taint di nodi non pronti (utile per agenti di rete/storage)
        - key: node.kubernetes.io/not-ready
          operator: Exists
          effect: NoExecute
        - key: node.kubernetes.io/unreachable
          operator: Exists
          effect: NoExecute
        # Tolera pressione disco e memoria (utile per agenti di cleanup)
        - key: node.kubernetes.io/disk-pressure
          operator: Exists
          effect: NoSchedule
        - key: node.kubernetes.io/memory-pressure
          operator: Exists
          effect: NoSchedule

      containers:
        - name: agent
          image: busybox:1.36
          command: ["sh", "-c"]
          args:
            - |
              echo "all-nodes-agent su: $NODE_NAME (inclusi control-plane)"
              echo "Tolera tutti i taint di sistema."
              sleep 3600
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          resources:
            requests: { cpu: 25m, memory: 16Mi }
            limits:   { cpu: 50m, memory: 32Mi }
---
# DaemonSet con toleration per taint personalizzato
# Utile per nodi "speciali" (GPU, FPGA, high-memory, ecc.)
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: gpu-agent
  namespace: default
  labels:
    app: gpu-agent
    scenario: ds-tolerations
spec:
  selector:
    matchLabels:
      app: gpu-agent

  template:
    metadata:
      labels:
        app: gpu-agent
        scenario: ds-tolerations
    spec:
      terminationGracePeriodSeconds: 5

      tolerations:
        # Tolera il taint "gpu=true:NoSchedule" applicato manualmente ai nodi GPU
        - key: gpu
          operator: Equal
          value: "true"
          effect: NoSchedule

      nodeSelector:
        gpu: "true"   # gira SOLO sui nodi GPU (non su tutti i nodi che tollerano)

      containers:
        - name: gpu-monitor
          image: busybox:1.36
          command: ["sh", "-c"]
          args:
            - |
              echo "gpu-agent su: $NODE_NAME (nodo GPU)"
              echo "Questo pod tolera il taint gpu=true:NoSchedule"
              sleep 3600
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          resources:
            requests: { cpu: 25m, memory: 16Mi }
            limits:   { cpu: 50m, memory: 32Mi }
