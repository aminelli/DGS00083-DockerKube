# Scenario 05 — Update Strategies
#
# Due strategie per aggiornare un DaemonSet:
#
# RollingUpdate (default):
#   - Aggiorna i pod nodo per nodo, mantenendo maxUnavailable nodi sempre up
#   - maxUnavailable: numero o percentuale di pod che possono essere inattivi
#     durante l'aggiornamento
#   - maxSurge: (k8s >= 1.22) numero di pod extra da creare durante l'update
#     (utile per garantire continuità del servizio)
#
# OnDelete:
#   - Il pod NON viene aggiornato automaticamente
#   - Si aggiorna manualmente eliminando il pod: il DaemonSet lo ricrea con la nuova versione
#   - Utile per aggiornamenti controllati nodo per nodo (es. drain → update → uncordon)
---
# DaemonSet con RollingUpdate aggressivo (maxUnavailable: 100% = tutti insieme)
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: ds-rolling
  namespace: default
  labels:
    app: ds-rolling
    scenario: ds-update
spec:
  selector:
    matchLabels:
      app: ds-rolling

  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1        # al massimo 1 nodo senza agente durante l'update
      # maxSurge: 0            # (k8s >= 1.22) pod extra durante update

  template:
    metadata:
      labels:
        app: ds-rolling
        scenario: ds-update
        version: v1            # cambia a v2 per mostrare il rolling update
    spec:
      terminationGracePeriodSeconds: 5
      containers:
        - name: agent
          image: busybox:1.36
          command: ["sh", "-c"]
          args:
            - |
              echo "ds-rolling su $NODE_NAME | version=$APP_VERSION"
              sleep 3600
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: APP_VERSION
              value: "v1"    # cambia in "v2" per il demo
          resources:
            requests: { cpu: 25m, memory: 16Mi }
            limits:   { cpu: 50m, memory: 32Mi }
---
# DaemonSet con OnDelete
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: ds-ondelete
  namespace: default
  labels:
    app: ds-ondelete
    scenario: ds-update
spec:
  selector:
    matchLabels:
      app: ds-ondelete

  updateStrategy:
    type: OnDelete       # ← nessun aggiornamento automatico

  template:
    metadata:
      labels:
        app: ds-ondelete
        scenario: ds-update
    spec:
      terminationGracePeriodSeconds: 5
      containers:
        - name: agent
          image: busybox:1.36
          command: ["sh", "-c"]
          args:
            - |
              echo "ds-ondelete su $NODE_NAME | version=$APP_VERSION"
              sleep 3600
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: APP_VERSION
              value: "v1"
          resources:
            requests: { cpu: 25m, memory: 16Mi }
            limits:   { cpu: 50m, memory: 32Mi }
